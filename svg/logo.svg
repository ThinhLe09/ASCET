<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  
  <defs>
    <!-- 轨道渐变：从主环色到轨道色 -->
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="25%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#4F8EF7"/>
      <stop offset="75%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  
  <!-- 背景椭圆轨道（完整的椭圆） -->
  <ellipse cx="128" cy="128" rx="104" ry="44"
           transform="rotate(-24 128 128)"
           fill="none" stroke="url(#orbitGradient)" stroke-width="10" stroke-linecap="round"/>
  
  <!-- 主环（覆盖部分椭圆，形成穿越效果） -->
  <circle cx="128" cy="128" r="74"
          fill="none" stroke="#2563EB" stroke-width="16" stroke-linecap="round"/>
  
  <!-- 主环内阴影效果（简化版） -->
  <circle cx="128" cy="129" r="74"
          fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
  
  <!-- 中央对勾 -->
  <path d="M100 128 L120 148 L160 108"
        fill="none" stroke="#16A34A" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 卫星球 -->
  <circle cx="206" cy="62" r="8" fill="#2563EB"/>
  <circle cx="50" cy="194" r="8" fill="#2563EB"/>
</svg>